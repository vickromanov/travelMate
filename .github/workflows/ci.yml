name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Turborepo runs only the packages affected by the change (cached).
      - name: Typecheck
        run: pnpm typecheck

      - name: Lint (incl. tier import-boundary rules)
        run: pnpm lint

      - name: Unit + contract tests
        run: pnpm test

      - name: Build the package graph
        run: pnpm build

  e2e:
    name: web E2E (Playwright)
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter @travelmate/web exec playwright install --with-deps
      - name: E2E
        run: pnpm e2e
