name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # IMPORTANT: do NOT pass `version:` here. The pnpm version is the single
      # source of truth in package.json ("packageManager": "pnpm@9.12.0").
      # Specifying it in both places fails with ERR_PNPM_BAD_PM_VERSION.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Turborepo runs only the packages affected by the change (cached).
      - name: Typecheck (tsc across every package)
        run: pnpm typecheck

      - name: Unit + contract tests (vitest)
        run: pnpm test

  # ── Roadmap: enable as the codebase grows (kept here on purpose) ───────────
  # lint   — add an ESLint flat config per package; the tier import-boundary
  #          preset already lives in packages/config/eslint.preset.js, so each
  #          package config can be a one-line re-export. Then add a `lint` step.
  # build  — library packages are "internal packages" validated by `typecheck`
  #          (no emit; consumers transpile the TS). The web app's `next build`
  #          becomes a real gate once apps/web has actual screens.
  # e2e    — add a Playwright config + specs once apps/web is interactive, then
  #          a job that runs `playwright install --with-deps` and `pnpm e2e`.
